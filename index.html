<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aljmalmo - مستودعاتي على GitHub</title>
    <meta name="description" content="استكشف جميع مشاريعي ومستودعاتي البرمجية على GitHub.">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            direction: rtl;
            text-align: right;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #007bff;
        }
        header h1 {
            color: #007bff;
            font-size: 2.8em;
            margin-bottom: 10px;
        }
        header p {
            font-size: 1.2em;
            color: #555;
        }
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .repo-card {
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* لتحقيق تباعد متساوٍ */
        }
        .repo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        .repo-card h3 {
            color: #28a745;
            font-size: 1.5em;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .repo-card p {
            color: #666;
            font-size: 0.95em;
            flex-grow: 1; /* للسماح للوصف بأخذ المساحة المتاحة */
        }
        .repo-card .details {
            margin-top: 15px;
            font-size: 0.9em;
            color: #777;
            border-top: 1px dashed #eee;
            padding-top: 10px;
        }
        .repo-card .details span {
            display: block;
            margin-bottom: 5px;
        }
        .repo-card a {
            display: inline-block;
            background-color: #007bff;
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
            transition: background-color 0.3s ease;
        }
        .repo-card a:hover {
            background-color: #0056b3;
        }
        .loading {
            text-align: center;
            font-size: 1.5em;
            color: #888;
            padding: 50px 0;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid #ddd;
            color: #777;
            font-size: 0.9em;
        }
        @media (max-width: 768px) {
            .container {
                margin: 20px auto;
                padding: 15px;
            }
            header h1 {
                font-size: 2em;
            }
            .repo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>أهلاً بك في صفحة <span style="color: #28a745;">Aljmalmo</span> على GitHub!</h1>
            <p>هنا ستجد جميع مستودعاتي ومشاريعي البرمجية التي أعمل عليها. يتم تحديث القائمة تلقائيًا.</p>
        </header>

        <main id="repos-container">
            <div class="loading">جارٍ تحميل المستودعات...</div>
        </main>

        <footer>
            <p>&copy; 2025 Aljmalmo. جميع الحقوق محفوظة.</p>
            <p>مدعوم بواسطة GitHub Pages و GitHub API.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const username = 'aljmalmo'; // تأكد إن ده اسم المستخدم بتاعك على GitHub
            const reposContainer = document.getElementById('repos-container');

            fetch(`https://api.github.com/users/${username}/repos?sort=updated&direction=desc`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(repos => {
                    reposContainer.innerHTML = ''; // مسح رسالة التحميل
                    if (repos.length === 0) {
                        reposContainer.innerHTML = '<p style="text-align: center; color: #888;">لا توجد مستودعات متاحة لعرضها حاليًا.</p>';
                        return;
                    }

                    const repoGrid = document.createElement('div');
                    repoGrid.className = 'repo-grid';

                    repos.forEach(repo => {
                        // استبعاد المستودع الرئيسي نفسه لو مش عايز يظهر في القائمة
                        if (repo.name === `${username}.github.io`) {
                            return;
                        }

                        const repoCard = document.createElement('div');
                        repoCard.className = 'repo-card';

                        const repoName = document.createElement('h3');
                        repoName.textContent = repo.name;

                        const repoDescription = document.createElement('p');
                        repoDescription.textContent = repo.description || 'لا يوجد وصف لهذا المستودع.';

                        const detailsDiv = document.createElement('div');
                        detailsDiv.className = 'details';

                        const languageSpan = document.createElement('span');
                        languageSpan.textContent = `اللغة: ${repo.language || 'غير محدد'}`;

                        const starsSpan = document.createElement('span');
                        starsSpan.textContent = `النجوم: ${repo.stargazers_count}`;

                        const lastUpdatedSpan = document.createElement('span');
                        lastUpdatedSpan.textContent = `آخر تحديث: ${new Date(repo.updated_at).toLocaleDateString('ar-EG')}`;

                        detailsDiv.appendChild(languageSpan);
                        detailsDiv.appendChild(starsSpan);
                        detailsDiv.appendChild(lastUpdatedSpan);

                        const repoLink = document.createElement('a');
                        repoLink.href = repo.html_url;
                        repoLink.target = '_blank'; // يفتح في تبويبة جديدة
                        repoLink.textContent = 'شاهد المستودع';

                        repoCard.appendChild(repoName);
                        repoCard.appendChild(repoDescription);
                        repoCard.appendChild(detailsDiv);
                        repoCard.appendChild(repoLink);

                        repoGrid.appendChild(repoCard);
                    });
                    reposContainer.appendChild(repoGrid);
                })
                .catch(error => {
                    console.error('Error fetching repositories:', error);
                    reposContainer.innerHTML = '<p style="text-align: center; color: #dc3545;">عذرًا، حدث خطأ أثناء تحميل المستودعات. يرجى المحاولة مرة أخرى لاحقًا.</p>';
                });
        });
    </script>
</body>
</html>
