            height: 4px;
            background-color: var(--secondary-accent-color);
            border-radius: 2px;

            border-radius: 12px;
            padding: 25px;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border-light); /* حدود واضحة */
            position: relative;

        .article-card:hover {
            transform: translateY(-8px); /* رفع متوسط */

        }

            margin-bottom: 20px;
            line-height: 1.4;
            font-weight: 700;
            text-align: center;
            flex-grow: 1;

        .read-more-btn {

            align-items: center;
            background-color: var(--primary-brand-color);

            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: auto;
            font-weight: bold;
            font-size: 1em;

            justify-content: center;

        .read-more-btn::before {

        }

        .read-more-btn:hover {
            background-color: var(--secondary-accent-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--shadow-medium);

        .loading, .error-message {
            text-align: center;
            font-size: 1.3em;
            color: var(--text-secondary-light);
            padding: 60px 0;

        .error-message {
            color: #dc3545;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }

            margin-top: 50px;

        /* Responsive Design */
        @media (max-width: 992px) { /* للتابلت والكمبيوتر الصغير */

            .hamburger-menu {

            .header-left {

            .header-logo-text {
                font-size: 1.8em;
            }
            .header-logo-text .icon {
                font-size: 1.1em;
            }
            .header-text-subtitle {
                font-size: 0.75em;
            }

            .main-content {
                padding: 20px;
            }
            .articles-section h2 {
                font-size: 2em;
            }
            .article-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* 2 أو 3 أعمدة حسب الشاشة */
                gap: 20px;
            }
            .article-card {
                padding: 18px;
            }
            .article-card .tag-icon {
                font-size: 2.5em;
                margin-bottom: 5px;
            }
            .article-card h3 {
                font-size: 1.3em;
                margin-bottom: 15px;
            }
            .read-more-btn {
                font-size: 0.95em;
                padding: 10px 18px;
            }
        }

        @media (max-width: 576px) { /* للموبايلات الصغيرة */
            .outer-container {
                margin: 20px auto;
                padding: 0 10px;
            }
            .main-content {
                padding: 15px;
            }
            header h1 {
                font-size: 1.8em;
            }
            header p {
                font-size: 0.8em;
            }
            .articles-section h2 {
                font-size: 1.6em;
            }
            .article-grid {
                grid-template-columns: 1fr; /* عمود واحد فقط على أصغر الشاشات */
                gap: 15px;
            }
        }
    </style>
</head>

            // بيانات المشاريع/المقالات المخصصة (العناوين والأوصاف)

            ];

            let allRepos = [];

            async function fetchAndDisplayArticles(filterTopic = null) {
                articlesContainer.innerHTML = '<div class="loading">جارٍ تجهيز المقالات...</div>';

                if (allRepos.length === 0) {
                    try {
                        const response = await fetch(`https://api.github.com/users/${githubUsername}/repos?per_page=100&sort=pushed&direction=desc`); 
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        allRepos = await response.json();
                    } catch (error) {
                        console.error('Error fetching repositories:', error);
                        articlesContainer.innerHTML = '<p class="error-message">عذرًا، حدث خطأ أثناء تحميل المقالات. يرجى المحاولة مرة أخرى لاحقًا.</p>';
                        return;
                    }
                }
                
                articlesContainer.innerHTML = ''; 

                const filteredDisplayRepos = allRepos.filter(repo => {
                    const isMainRepo = repo.name === `${githubUsername}.github.io`;
                    const isFork = repo.fork;
                    const matchesTopic = filterTopic ? (repo.topics && repo.topics.includes(filterTopic)) : true;
                    return !isMainRepo && !isFork && matchesTopic;
                });

                if (filteredDisplayRepos.length === 0) {
                    articlesContainer.innerHTML = `<p class="error-message">لا توجد مقالات متاحة للعرض حاليًا ${filterTopic ? 'في هذا الموضوع' : ''}.</p>`;
                    return;
                }

                const articleGrid = document.createElement('div');
                articleGrid.className = 'article-grid';

                let articleCounter = 0; // عداد المقالات لتحديد الرمز
                filteredDisplayRepos.forEach(repo => {
                    const customData = customProjectData.find(data => data.repo_name === repo.name);

                    const articleCard = document.createElement('div');
                    articleCard.className = 'article-card';

                    // أيقونة التاج
                    const tagIcon = document.createElement('span');
                    tagIcon.className = 'tag-icon';
                    tagIcon.textContent = emojiIcons[articleCounter % emojiIcons.length]; // تدوير الرموز
                    articleCounter++;
                    articleCard.appendChild(tagIcon);

                    const articleTitle = document.createElement('h3');
                    articleTitle.textContent = customData ? customData.display_title : (repo.description || repo.name); 
                    
                    const readMoreBtn = document.createElement('a');
                    readMoreBtn.className = 'read-more-btn';
                    
                    if (repo.has_pages) {
                        readMoreBtn.href = `${customDomain}/${repo.name}/`; 
                    } else {
                        readMoreBtn.href = repo.html_url;
                    }
                    readMoreBtn.target = '_blank';
                    readMoreBtn.textContent = 'قراءة المزيد';

                    articleCard.appendChild(articleTitle);
                    articleCard.appendChild(readMoreBtn);

                    articleGrid.appendChild(articleCard);
                });
                articlesContainer.appendChild(articleGrid);
            }

            // دالة لجلب وعرض المواضيع في الهيدر والنافذة الجانبية
            async function fetchAndDisplayTopics() {
                desktopTopicsList.innerHTML = '';
                mobileTopicsList.innerHTML = '';

                if (allRepos.length === 0) { 
                    await fetchAndDisplayArticles(); 
                }

                allTopics.clear(); 

                allRepos.forEach(repo => {
                    if (repo.topics && Array.isArray(repo.topics)) {
                        repo.topics.forEach(topic => allTopics.add(topic));
                    }
                });

                if (allTopics.size === 0) {
                    desktopTopicsList.innerHTML = '<li>لا توجد مواضيع.</li>';
                    mobileTopicsList.innerHTML = '<li>لا توجد مواضيع.</li>';
                    return;
                }

                // إضافة زر "كل المقالات" للاثنين
                const createAllArticlesLink = () => {
                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = "#all";
                    link.textContent = "كل المقالات";
                    link.classList.add('active-topic'); 
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        document.querySelectorAll('.topic-list a, .header-nav a, .mobile-nav-content a').forEach(item => item.classList.remove('active-topic'));
                        link.classList.add('active-topic');
                        fetchAndDisplayArticles(null); 
                        mobileNavOverlay.style.display = 'none'; // إخفاء القائمة بعد الاختيار
                    });
                    li.appendChild(link);
                    return li;
                };

                desktopTopicsList.appendChild(createAllArticlesLink());
                mobileTopicsList.appendChild(createAllArticlesLink());


                // إضافة المواضيع الفعلية مع الترجمة
                Array.from(allTopics).sort().forEach(topic => {
                    const createTopicLink = (isMobile = false) => {
                        const li = document.createElement('li');
                        const link = document.createElement('a');
                        link.href = `#${topic}`;
                        // **هنا يتم تطبيق الترجمة:**
                        link.textContent = topicTranslations[topic] || topic.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' '); 
                        
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            document.querySelectorAll('.topic-list a, .header-nav a, .mobile-nav-content a').forEach(item => item.classList.remove('active-topic'));
                            e.target.classList.add('active-topic');
                            fetchAndDisplayArticles(topic); 
                            if (isMobile) {
                                mobileNavOverlay.style.display = 'none'; // إخفاء القائمة بعد الاختيار
                            }
                        });
                        li.appendChild(link);
                        return li;
                    };
                    desktopTopicsList.appendChild(createTopicLink());
                    mobileTopicsList.appendChild(createTopicLink(true));
                });
            }
            
            // تفعيل قائمة الهامبرجر
            hamburgerIcon.addEventListener('click', () => {
                mobileNavOverlay.style.display = 'flex';
            });
            closeMobileNavBtn.addEventListener('click', () => {
                mobileNavOverlay.style.display = 'none';
            });
            mobileNavOverlay.addEventListener('click', (e) => {
                if (e.target === mobileNavOverlay) { // لو داس على الخلفية السودا
                    mobileNavOverlay.style.display = 'none';
                }
            });


            // تنفيذ الدالتين عند تحميل الصفحة
            fetchAndDisplayArticles(); 
            fetchAndDisplayTopics();
        });
    </script>
</body>
</html>
